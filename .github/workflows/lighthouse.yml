name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Audit Performance, Accessibility, SEO, Best Practices
    runs-on: ubuntu-latest
    # ubuntu-latest ships Google Chrome (`google-chrome-stable`) preinstalled,
    # which Lighthouse auto-detects — no separate Chrome setup step needed.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run Lighthouse CI
        # @lhci/cli is pinned in devDependencies; run the package.json script
        # so the audited version stays in lockstep with the repo.
        run: bun run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
